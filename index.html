<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenmart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./public/css/home.css">
    <link rel="stylesheet" href="./public/css/command.css">
</head>
<body>
    <div class="navbar_frame">
        <div class="container"> 
               <div class="navbar_top">
                 <a href="./index.html">
                    <img src="./Public/images/icons/logo.png">
                    </a>
                    <div class="nav_search_frame">
                    <div class="search_box">
                    <div class="category_list">
                        <select name="" id="">
                            <option value="all" selected>All Categories</option>
                            <option value="electronics">Electronics</option>
                            <option value="fashion">Fashion</option>        
                            <option value="home">Home & Garden</option>
                            <option value="beauty">Beauty & Health</option> 

                        </select>
                    </div>
                    <input type="text" placeholder="Search products…">
                </div>



                <div class="search_icon_box">
                    <img src="./Public/images/icons/search.svg">
                </div>     
                </div>
             <div class="nav_top_menu">
                <div class="top_menu_box">
                    <div class="box_icon_box">
                        <img src="./Public/images/icons/heart.svg">
                    </div>
                    <div class="box_info_box">
                        <span>Wishlist</span>
                        <strong>My Items</strong>
                    </div>

                </div>
                <div class="top_menu_box">
                    <div class="box_icon_box">
                        <img src="./Public/images/icons/profile.svg">
                    </div>
                    <div class="box_info_box">
                        <span>Sign in</span>
                        <strong>Account</strong>
                    </div>

                </div>
                <div class="top_menu_box">
                    <div class="box_icon_box">
                        <div class="backet_count">2</div>
                        <img src="./Public/images/icons/shopping-cart.svg">
                    </div>
                    <div class="box_info_box">
                        <span>$200.99</span>
                        <strong>Total</strong>
                    </div>

                </div>
             </div>
        </div>
        <div class="navbar_bottom">
            <div class="navbar_bottom_menu_box">
                <div class="browse_box">
                    <img src="./Public/images/icons/browse.svg">
                    <span>Browse Categories</span>
                </div>
                <div class="navbar_route_menu">
                <a href="./index.html" class="title">Home</a>
                <a href="./index.html">Shop</a>
                <a href="./index.html">Orders</a>
                <a href="./index.html">About</a>
                <a href="./index.html">Contact</a>
                </div>

              <div class="sorting_menu">
                <span>Deal of the Day</span>
                <span>Hot Deals</span>
                <span>Best Sellers</span>
                <span>New Arrivals</span>
              </div>

            </div>

            
        </div>
    </div>
    
</body>
</html>
